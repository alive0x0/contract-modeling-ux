<!DOCTYPE html>
<html>
<head>
<style>
  body { font-family: 'Inter', system-ui, sans-serif; padding: 16px; background: #fff; color: #353331; font-size: 13px; margin: 0; }
  h3 { font-size: 14px; font-weight: 700; margin-bottom: 6px; }
  p { color: #6b6966; font-size: 12px; line-height: 1.5; margin-bottom: 12px; }
  button#run {
    width: 100%; padding: 10px;
    background: #0033ff; color: #fff;
    border: none; border-radius: 4px;
    font-size: 13px; font-weight: 700;
    cursor: pointer; font-family: inherit;
    letter-spacing: 0.01em;
  }
  button#run:hover { background: #110081; }
  button#run:disabled { background: #a3a19f; cursor: default; }
  #status { margin-top: 10px; font-size: 11px; color: #6b6966; min-height: 18px; line-height: 1.6; white-space: pre-line; }
  .done { color: #007442 !important; font-weight: 700; }
  .error { color: #a90000 !important; }
  .bar { height: 3px; background: #e0ddda; border-radius: 2px; margin-top: 8px; overflow: hidden; }
  .fill { height: 100%; background: #0033ff; border-radius: 2px; transition: width 0.25s; width: 0%; }
</style>
</head>
<body>
  <h3>Scenario Dashboard Builder</h3>
  <p>Creates a new <strong>Scenario Dashboard</strong> page in this Figma file — renewal intelligence, team activity, quick access, and scenario table — using Canvas design tokens.</p>
  <button id="run" onclick="go()">▶ Build Dashboard</button>
  <div class="bar"><div class="fill" id="fill"></div></div>
  <div id="status"></div>
<script>
  function go() {
    document.getElementById('run').disabled = true;
    document.getElementById('status').textContent = 'Starting…';
    parent.postMessage({ pluginMessage: { type: 'build' } }, '*');
  }
  window.onmessage = (e) => {
    const m = e.data.pluginMessage;
    if (!m) return;
    if (m.type === 'progress') {
      document.getElementById('status').textContent = m.text;
      document.getElementById('fill').style.width = (m.pct || 0) + '%';
    }
    if (m.type === 'done') {
      document.getElementById('status').textContent = m.text;
      document.getElementById('status').className = 'done';
      document.getElementById('fill').style.width = '100%';
      document.getElementById('run').disabled = false;
      document.getElementById('run').textContent = '✓ Done — click to rebuild';
    }
    if (m.type === 'error') {
      document.getElementById('status').textContent = 'Error: ' + m.text;
      document.getElementById('status').className = 'error';
      document.getElementById('run').disabled = false;
    }
  };
</script>
</body>
</html>
